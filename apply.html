<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Apply - Season 4</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* BACKGROUND */
body {
    font-family: Arial;
    color: white;
    background-image: url("https://wallpapercave.com/wp/snjNQdA.jpg"); /* ADD IMAGE */
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
}

/* DARK OVERLAY */
body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.8);
    z-index: -1;
}

/* NAVBAR */
.navbar {
    display: flex;
    justify-content: center;
    gap: 50px;
    padding: 18px;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(10px);
}

.navbar a {
    color: #00d4ff;
    text-decoration: none;
    font-weight: bold;
}

/* HEADER */
.header {
    text-align: center;
    padding: 60px 20px 20px;
}

.header h1 {
    font-size: 44px;
}

.header p {
    opacity: 0.7;
    margin-top: 10px;
}

/* FORM CARD */
.form-card {
    width: 90%;
    max-width: 750px;
    margin: 30px auto;
    padding: 35px;
    border-radius: 18px;
    background: rgba(0,0,0,0.7);
    border: 1px solid rgba(0,200,255,0.3);
    backdrop-filter: blur(12px);
    box-shadow: 0 0 30px rgba(0,0,0,0.8);
}

/* SECTION TITLES */
.section-title {
    margin-top: 25px;
    margin-bottom: 10px;
    color: #00eaff;
    font-size: 18px;
    border-bottom: 1px solid rgba(0,200,255,0.2);
    padding-bottom: 5px;
}

/* INPUTS */
input, textarea {
    width: 100%;
    padding: 14px;
    margin-top: 8px;
    margin-bottom: 20px;
    border-radius: 10px;
    border: none;
    background: rgba(255,255,255,0.08);
    color: white;
}

input::placeholder, textarea::placeholder {
    color: rgba(255,255,255,0.5);
}

input:focus, textarea:focus {
    outline: none;
    box-shadow: 0 0 10px #00d4ff;
}

/* BUTTON */
button {
    width: 100%;
    padding: 16px;
    background: linear-gradient(45deg, #00eaff, #008cff);
    border: none;
    border-radius: 12px;
    cursor: pointer;
    font-size: 16px;
    margin-top: 10px;
}

button:hover {
    transform: scale(1.05);
    box-shadow: 0 0 25px #00d4ff;
}

/* SMALL TEXT */
.note {
    font-size: 13px;
    opacity: 0.6;
    text-align: center;
    margin-top: 10px;
}
</style>

</head>

<body>

<div class="navbar">
    <a href="index.html">Home</a>
    <a href="apply.html">Apply</a>
    <a href="rules.html">Rules</a>
</div>

<div class="header">
    <h1>📝 Season 4 Application</h1>
    <p>Apply to join Crabby’s Civilization Experiment</p>
</div>

<div class="form-card">

<form action="https://formspree.io/f/xnjggkwd" method="POST">

<div class="section-title">👤 Basic Info</div>

<label>Minecraft Username</label>
<input type="text" name="minecraft" placeholder="Your IGN" required>

<label>Discord Username</label>
<input type="text" name="discord" placeholder="name#0000" required>

<label>Age</label>
<input type="number" name="age" required>

<label>Country & Timezone</label>
<input type="text" name="location" placeholder="UK, GMT" required>

<div class="section-title">🎮 Experience</div>

<label>Experience with civilization events</label>
<textarea name="experience" rows="4" required></textarea>

<div class="section-title">🧠 Scenario</div>

<label>How would you survive in a post-apocalyptic world?</label>
<textarea name="survival" rows="4" required></textarea>

<div class="section-title">⚔️ Skills</div>

<label>What skills do you bring?</label>
<textarea name="skills" rows="4" required></textarea>

<div class="section-title">🏆 Final</div>

<label>Why should we accept you?</label>
<textarea name="reason" rows="4" required></textarea>

<button type="submit">Submit Application</button>

</form>

<div class="note">
You can only apply once per wave.
</div>

</div>

</body>
</html>
