<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Crabby Civilization</title>

<style>
* {margin:0; padding:0; box-sizing:border-box;}

body {
    font-family: Arial;
    color:white;
    background:url("https://wallpapercave.com/wp/snjNQdA.jpg") center/cover no-repeat;
    height:100vh;
}

/* DARK OVERLAY */
body::before {
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.7);
}

/* CONTENT */
.hero {
    position:relative;
    height:100%;
    display:flex;
    align-items:center;
    padding-left:10%;
}

/* TEXT */
.text h1 {
    font-size:70px;
    line-height:1.1;
}

.highlight {
    color:#00d4ff;
}

.text p {
    margin-top:20px;
    opacity:0.8;
    max-width:500px;
}

/* BUTTONS */
.buttons {
    margin-top:30px;
}

button {
    padding:12px 25px;
    border:none;
    border-radius:8px;
    margin-right:10px;
    cursor:pointer;
    font-weight:bold;
}

.apply {
    background:#00d4ff;
    color:black;
}

.enter {
    background:transparent;
    border:1px solid #00d4ff;
    color:#00d4ff;
}

/* HOVER */
button:hover {
    transform:scale(1.05);
}
</style>
</head>

<body>

<div class="hero">

<div class="text">

<p>SEASON 4 — NOW OPEN</p>

<h1>
CRABBY'S<br>
<span class="highlight">CIVILIZATION</span>
</h1>

<p>
Build civilizations, wage wars, form alliances, and dominate the world.
</p>

<div class="buttons">
<a href="apply.html"><button class="apply">Apply Now</button></a>
<a href="home.html"><button class="enter">Enter Site</button></a>
</div>

</div>

</div>

</body>
</html>
